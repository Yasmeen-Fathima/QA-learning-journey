description: "FIeld Inspection Summariser eval"

prompts:
  - id: inspection_prompt
    raw: |
      [
        {"role": "system", "content": "Respond with specific fields asset id, asset type, Severity: [Low/Medium/High/Critical] (score X/10), Risk: [Low/Medium/High] (score X/10), location when not specified set it to N/A, Vague_Input_Flag: [Yes/No], Review_Flag, Deviation: [Normal/Not Normal], Description and nothing else, .You must respond with only a raw JSON object. Your response must begin with { and end with }. No markdown. No backticks. No code fences. No text before or after the JSON.set Vague Input Flag to Yes if there are less than 5 words with no identifiable asset type or location or asset id and if there are meaningless string or gibberish language otherwise set it to No. If input is provided in a language other than English display 'Language not supported' message and do not display field values"},
        {"role": "user", "content": "{{inspection_note}}"}
      ]
providers:
  - id: anthropic:claude-opus-4-6
    config:
      temperature: 0
      max_tokens: 1024

defaultTest:
  assert: 
    - type: is-json
    - type: icontains-all
      value: 
        - "asset_type"
        - "severity"
        - "location"
        - "asset_id"
        - "risk"
        - "vague_input_flag"
        - "review_flag"
        - "description"
        - "deviation"
tests:

  - vars:
      inspection_note: "Pole 4872 leaning 15 degrees, rust at base, near substation 3"
    assert:
      - type: icontains-all
        value: 
          - "4872"
          - "rust"
          - "substation 3"
  
  - vars:
      inspection_note: "sdsadss dsjsj fdfsdf"
    assert:
      - type: icontains
        value: N/A

  - vars:
      inspection_note: "bad pole"
    assert:
      - type: javascript
        value: "JSON.parse(output).Vague_Input_Flag === 'Yes'"

  - vars:
      inspection_note: "Tower 99 severely damaged, multiple cross arms broken, high voltage 132kV line, near hospital"
    assert:
      - type: icontains
        value: Critical

  - vars:
      inspection_note: "Pole asset AS-501 near hogan street is safe and is in very good condition"
    assert:
      - type: javascript
        value: "JSON.parse(output).Deviation === 'Normal'"
  
  - vars:
      inspection_note: "dasda asdd dsadad"
    assert:
      - type: javascript
        value: "JSON.parse(output).Vague_Input_Flag === 'Yes'"

  - vars:
      inspection_note: "found tampered in heavy rain and thunder"
    assert:
      - type: javascript
        value: "JSON.parse(output).Vague_Input_Flag === 'Yes'"

  - vars:
      inspection_note: "Heavy rusted pole 5646 is found in Deer Street, immediate attention required"
    assert:
      - type: javascript
        value: "JSON.parse(output).Vague_Input_Flag === 'No'"
    
  - vars: 
      inspection_note: "होगन स्ट्रीट में पोल ​​एसेट 5434 बुरी तरह क्षतिग्रस्त हो गया है।"
    assert:
      - type: contains
        value: "Language not supported"

  - vars:
      inspection_note: "asset 7865 is damaged and require immediate action to be taken"
    assert:
      - type: javascript
        value: "JSON.parse(output).location === 'N/A'"

  - vars:
      inspection_note: "asset 7568 is damaged and require immediate attention at plyte street"
    assert:
      - type: contains
        value: "7568"

  - vars:
      inspection_note: "Severe thunderstorm last night has completely damaged pole 4523 on kunat street"
    assert:
      - type: javascript
        value: "JSON.parse(output).Severity.includes('High') || JSON.parse(output).Severity.includes('Critical') || JSON.parse(output).Severity.includes('Critical') "

  - vars:
      inspection_note: "Severe thunderstorm last night has destroyed pole 4523 on kunat street"
    assert:
      - type: javascript
        value: "JSON.parse(output).Severity.includes('High') || JSON.parse(output).Severity.includes('Critical')"
  
  - vars:
      inspection_note: "Severe thunderstorm last night has destroyed pole 4523 on kunat street"
    assert:
      - type: javascript
        value: "JSON.parse(output).Review_Flag === 'Yes'"

  - vars:
      inspection_note: "Severe thunderstorm last night but asset is completely fine. no issues at all"
    assert:
      - type: javascript
        value: "JSON.parse(output).Severity.includes('Low')"