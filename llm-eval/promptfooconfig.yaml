description: "FIeld Inspection Summariser eval"

prompts:
  - id: inspection_prompt
    raw: |
      [
        {"role": "system", "content": "Respond with specific fields asset id, asset type, Severity: [Low/Medium/High/Critical] (score X/10), Risk: [Low/Medium/High] (score X/10), location, Vague_Input_Flag: [Yes/No], Review_Flag, Deviation: [Normal/Not Normal], Description and nothing else, .You must respond with only a raw JSON object. Your response must begin with { and end with }. No markdown. No backticks. No code fences. No text before or after the JSON."},
        {"role": "user", "content": "{{inspection_note}}"}
      ]
providers:
  - id: anthropic:claude-opus-4-6
    config:
      temperature: 0
      max_tokens: 1024

defaultTest:
  assert: 
    - type: is-json
    - type: icontains-all
      value: 
        - "asset_type"
        - "severity"
        - "location"
        - "asset_id"
        - "risk"
        - "vague_input_flag"
        - "review_flag"
        - "description"
        - "deviation"
tests:

  - vars:
      inspection_note: "Pole 4872 leaning 15 degrees, rust at base, near substation 3"
    assert:
      - type: icontains-all
        value: 
          - "4872"
          - "rust"
          - "substation 3"
  
  - vars:
      inspection_note: "sdsadss dsjsj fdfsdf"
    assert:
      - type: icontains
        value: N/A

  - vars:
      inspection_note: "bad pole"
    assert:
      - type: javascript
        value: "JSON.parse(output).Vague_Input_Flag === 'Yes'"

  - vars:
      inspection_note: "Tower 99 severely damaged, multiple cross arms broken, high voltage 132kV line, near hospital"
    assert:
      - type: icontains
        value: Critical

  - vars:
      inspection_note: "Pole asset AS-501 near hogan street is safe and is in very good condition"
    assert:
      - type: javascript
        value: "JSON.parse(output).Deviation === 'Normal'"